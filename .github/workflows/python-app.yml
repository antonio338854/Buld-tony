name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Build com Buildozer
        # ATENÇÃO: O erro está nas letras minúsculas. 
        # Copie esta linha exatamente como está:
        uses: ArtemSerebriakov/buildozer-action@v1
        with:
          buildozer_version: master
          python_version: 3.11
          subcommand: android debug

      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: TonyMath-APK
          path: bin/*.apk
