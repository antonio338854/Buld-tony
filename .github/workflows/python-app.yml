name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      # O ERRO ESTÁ AQUI EMBAIXO: COPIE ESTA LINHA EXATAMENTE
      - name: Build com Buildozer
        uses: ArtemSerebriakov/buildozer-action@v1
        with:
          buildozer_version: master
          python_version: 3.11
          subcommand: android debug

      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: TonyMath-Package
          path: bin/*.apk
